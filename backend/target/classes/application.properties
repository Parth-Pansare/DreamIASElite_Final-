# --- SERVER CONFIGURATION ---
server.port=8080
server.servlet.context-path=/api/v1

# --- DATABASE CONFIGURATION (PostgreSQL) ---
# Replace with your actual local database details
spring.datasource.url=jdbc:postgresql://localhost:5432/dreamias_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE CONFIGURATION ---
# 'update' will create tables if they don't exist, and update them if they change.
# Use 'validate' or 'none' in Production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- LOGGING CONFIGURATION ---
logging.level.org.springframework.web=DEBUG
logging.level.com.dreamias.backend=DEBUG
